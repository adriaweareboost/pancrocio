<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>PanCROcio — Admin Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Open Sans', -apple-system, sans-serif; background: #f8f9fb; color: #46495C; }
    h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }

    .header { background: #070F2D; color: white; padding: 20px 24px; display: flex; align-items: center; gap: 16px; }
    .header img { width: 40px; height: 48px; }
    .header h1 { font-size: 20px; font-weight: 800; }
    .header h1 span { color: #EC5F29; }
    .header .badge { background: rgba(255,255,255,0.15); padding: 4px 12px; border-radius: 100px; font-size: 11px; margin-left: auto; }

    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 8px rgba(7,15,45,0.06); text-align: center; }
    .stat-card .number { font-size: 36px; font-weight: 800; color: #070F2D; font-family: 'Plus Jakarta Sans', sans-serif; }
    .stat-card .label { font-size: 13px; color: #9ca3af; margin-top: 4px; }
    .stat-card.highlight .number { color: #EC5F29; }

    .toolbar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .toolbar input { flex: 1; min-width: 200px; padding: 10px 16px; border: 1px solid #e2e4ea; border-radius: 10px; font-size: 14px; outline: none; }
    .toolbar input:focus { border-color: #EC5F29; }
    .toolbar button { padding: 10px 20px; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .btn-primary { background: linear-gradient(90deg, #dd974b, #db501a); color: white; }
    .btn-danger { background: #dc2626; color: white; }
    .btn-secondary { background: #e2e4ea; color: #070F2D; }

    .table-wrap { background: white; border-radius: 16px; box-shadow: 0 2px 8px rgba(7,15,45,0.06); overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #070F2D; color: white; padding: 12px 16px; text-align: left; font-weight: 600; white-space: nowrap; position: sticky; top: 0; }
    td { padding: 10px 16px; border-bottom: 1px solid #f3f4f6; }
    tr:hover td { background: #fafbfc; }
    .badge-ok { background: #dcfce7; color: #16a34a; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 700; }
    .badge-no { background: #fef2f2; color: #dc2626; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 700; }
    .badge-pending { background: #fff7ed; color: #ea580c; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 700; }
    .score { font-weight: 800; font-family: 'Plus Jakarta Sans', sans-serif; }
    .score-good { color: #22c55e; }
    .score-ok { color: #EC5F29; }
    .score-bad { color: #dc2626; }
    .url-cell { max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .url-cell a { color: #EC5F29; text-decoration: none; }
    .date-cell { white-space: nowrap; color: #9ca3af; font-size: 12px; }

    .login { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
    .login-card { background: white; border-radius: 16px; padding: 40px; box-shadow: 0 4px 24px rgba(7,15,45,0.10); max-width: 400px; width: 100%; text-align: center; }
    .login-card img { width: 60px; margin-bottom: 12px; }
    .login-card h2 { margin-bottom: 20px; color: #070F2D; }
    .login-card input { width: 100%; padding: 12px 16px; border: 1px solid #e2e4ea; border-radius: 10px; font-size: 16px; margin-bottom: 16px; outline: none; text-align: center; font-family: monospace; }
    .login-card button { width: 100%; }

    .empty { text-align: center; padding: 60px 20px; color: #9ca3af; }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    @media (max-width: 600px) {
      .container { padding: 12px; }
      .stats { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .stat-card { padding: 16px; }
      .stat-card .number { font-size: 28px; }
    }
  </style>
</head>
<body>
  <!-- Login screen -->
  <div id="loginScreen" class="login">
    <div class="login-card">
      <img src="/pancrocio.svg" alt="PanCROcio">
      <h2>Admin Dashboard</h2>
      <input type="password" id="keyInput" placeholder="Admin Key" autofocus>
      <button class="btn-primary" onclick="login()" style="padding:14px;font-size:16px;border-radius:100px;border:none;width:100%;cursor:pointer;font-weight:700;color:white;background:linear-gradient(90deg,#dd974b,#db501a)">Acceder</button>
      <p id="loginError" style="color:#dc2626;font-size:13px;margin-top:12px;display:none">Clave incorrecta</p>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" style="display:none">
    <div class="header">
      <img src="/pancrocio.svg" alt="">
      <h1>Pan<span>CRO</span>cio</h1>
      <span class="badge">Admin Dashboard</span>
    </div>

    <div class="container">
      <div class="stats" id="statsGrid"></div>

      <div class="toolbar">
        <input type="text" id="searchInput" placeholder="Buscar por email o URL..." oninput="filterTable()">
        <button class="btn-secondary" onclick="loadData()">Actualizar</button>
        <button class="btn-danger" onclick="purgeData()">Purgar todo</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Email</th>
              <th>URL</th>
              <th>Score</th>
              <th>Estado</th>
              <th>Verificado</th>
              <th>Fecha</th>
              <th>Informe</th>
            </tr>
          </thead>
          <tbody id="leadsBody"></tbody>
        </table>
        <div class="empty" id="emptyState" style="display:none">
          <div class="empty-icon">📊</div>
          <p>No hay leads todavía</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    var adminKey = '';

    function login() {
      adminKey = document.getElementById('keyInput').value.trim();
      if (!adminKey) return;
      fetch('/api/v1/admin/leads?key=' + encodeURIComponent(adminKey))
        .then(function(r) {
          if (!r.ok) throw new Error('Unauthorized');
          return r.json();
        })
        .then(function(data) {
          document.getElementById('loginScreen').style.display = 'none';
          document.getElementById('dashboard').style.display = 'block';
          renderData(data);
        })
        .catch(function() {
          document.getElementById('loginError').style.display = 'block';
        });
    }

    document.getElementById('keyInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') login();
    });

    function loadData() {
      fetch('/api/v1/admin/leads?key=' + encodeURIComponent(adminKey))
        .then(function(r) { return r.json(); })
        .then(renderData);
    }

    function renderData(data) {
      var stats = data.stats || {};
      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card highlight"><div class="number">${stats.total || 0}</div><div class="label">Total Leads</div></div>
        <div class="stat-card"><div class="number">${stats.verified || 0}</div><div class="label">Verificados</div></div>
        <div class="stat-card"><div class="number">${stats.completed || 0}</div><div class="label">Auditorías</div></div>
        <div class="stat-card"><div class="number">${stats.total ? Math.round((stats.verified / stats.total) * 100) : 0}%</div><div class="label">Tasa verificación</div></div>
      `;

      var leads = data.leads || [];
      window._allLeads = leads;
      renderTable(leads);
    }

    function renderTable(leads) {
      var tbody = document.getElementById('leadsBody');
      var empty = document.getElementById('emptyState');

      if (leads.length === 0) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      tbody.innerHTML = leads.map(function(l) {
        var score = l.global_score;
        var scoreClass = score >= 80 ? 'score-good' : score >= 60 ? 'score-ok' : 'score-bad';
        var statusBadge = l.audit_status === 'completed' ? '<span class="badge-ok">Completado</span>'
          : l.audit_status === 'failed' ? '<span class="badge-no">Fallido</span>'
          : '<span class="badge-pending">' + (l.audit_status || 'Pendiente') + '</span>';
        var verifiedBadge = l.email_verified ? '<span class="badge-ok">Sí</span>' : '<span class="badge-no">No</span>';
        var date = l.created_at ? new Date(l.created_at).toLocaleString('es-ES', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '-';
        var reportLink = l.audit_id && l.audit_status === 'completed'
          ? '<a href="/api/v1/audit/' + l.audit_id + '/report" target="_blank" style="color:#EC5F29">Ver</a>'
          : '-';

        return '<tr>' +
          '<td>' + esc(l.email || '') + '</td>' +
          '<td class="url-cell"><a href="' + esc(l.url || '') + '" target="_blank">' + esc(l.url || '') + '</a></td>' +
          '<td><span class="score ' + scoreClass + '">' + (score != null ? score : '-') + '</span></td>' +
          '<td>' + statusBadge + '</td>' +
          '<td>' + verifiedBadge + '</td>' +
          '<td class="date-cell">' + date + '</td>' +
          '<td>' + reportLink + '</td>' +
          '</tr>';
      }).join('');
    }

    function filterTable() {
      var q = document.getElementById('searchInput').value.toLowerCase();
      var filtered = (window._allLeads || []).filter(function(l) {
        return (l.email || '').toLowerCase().includes(q) || (l.url || '').toLowerCase().includes(q);
      });
      renderTable(filtered);
    }

    function purgeData() {
      if (!confirm('¿Seguro? Esto borrará TODOS los leads, auditorías y cache.')) return;
      fetch('/api/v1/admin/purge?key=' + encodeURIComponent(adminKey), { method: 'POST' })
        .then(function(r) { return r.json(); })
        .then(function() { loadData(); });
    }

    function esc(s) {
      var d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
  </script>
</body>
</html>
