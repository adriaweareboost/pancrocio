<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- PanCROcio favicon: face with glasses -->
  <circle cx="16" cy="16" r="15" fill="#fbbf24" stroke="#f59e0b" stroke-width="1"/>
  <!-- Hair -->
  <path d="M3 13 Q6 3 16 6 Q26 3 29 13" fill="#92400e"/>
  <!-- Left eye -->
  <circle cx="11" cy="15" r="4" fill="white"/>
  <circle cx="11.5" cy="15.5" r="2" fill="#1e293b"/>
  <!-- Right eye -->
  <circle cx="21" cy="15" r="4" fill="white"/>
  <circle cx="21.5" cy="15.5" r="2" fill="#1e293b"/>
  <!-- Glasses -->
  <circle cx="11" cy="15" r="5.5" fill="none" stroke="#475569" stroke-width="1.5"/>
  <circle cx="21" cy="15" r="5.5" fill="none" stroke="#475569" stroke-width="1.5"/>
  <line x1="16.5" y1="15" x2="15.5" y2="15" stroke="#475569" stroke-width="1.5"/>
  <!-- Smile -->
  <path d="M10 21 Q16 26 22 21" fill="none" stroke="#92400e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- CRO badge -->
  <rect x="20" y="24" width="12" height="8" rx="3" fill="#EC5F29"/>
  <text x="26" y="30" font-size="5.5" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">CRO</text>
</svg>
